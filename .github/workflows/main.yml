name: CI

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kernel:
    name: Build Kernel (stone Android 16)
    runs-on: ubuntu-22.04

    steps:

      # Step 1 — Install Required Tools
      - name: Install Dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            curl \
            flex \
            git \
            kmod \
            libssl-dev \
            libelf-dev \
            libncurses5-dev \
            libncursesw5-dev \
            lzop \
            python3 \
            unzip \
            zip \
            wget \
            device-tree-compiler

      # Step 2 — Install mkdtimg (STABLE METHOD)
      - name: Install mkdtimg
        run: |
          wget https://raw.githubusercontent.com/osm0sis/mkbootimg/master/mkdtimg

          chmod +x mkdtimg

          sudo mv mkdtimg /usr/local/bin/

      # Step 3 — Verify mkdtimg
      - name: Verify mkdtimg
        run: |
          which mkdtimg
          mkdtimg --help || true

      # Step 4 — Build Kernel
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/kamikaonashi/kernel_xiaomi_stone
          kernel-branch: 16
          config: stone_defconfig
          arch: arm64

          aosp-gcc: true
          aosp-clang: true
          aosp-clang-version: r383902

          android-version: 16

          anykernel3: true
          ccache: true

          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
