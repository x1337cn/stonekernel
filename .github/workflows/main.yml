name: CI

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kernel:
    name: Build Kernel (stone Android 16)
    runs-on: ubuntu-22.04

    steps:

      # Install dependencies
      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            curl \
            flex \
            git \
            kmod \
            libssl-dev \
            libelf-dev \
            libncurses5-dev \
            libncursesw5-dev \
            lzop \
            python3 \
            unzip \
            zip \
            wget \
            device-tree-compiler

      # ✅ CORRECT mkdtimg installation
      - name: Install mkdtimg (Correct Method)
        run: |
          git clone https://android.googlesource.com/platform/system/libufdt
          sudo cp libufdt/utils/src/mkdtimg.py /usr/local/bin/mkdtimg
          sudo chmod +x /usr/local/bin/mkdtimg

      # Verify mkdtimg
      - name: Verify mkdtimg
        run: |
          mkdtimg --help || echo "mkdtimg ready"

      # Kernel Build
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/kamikaonashi/kernel_xiaomi_stone
          kernel-branch: 16
          config: stone_defconfig
          arch: arm64

          aosp-gcc: true
          aosp-clang: true
          aosp-clang-version: r383902

          android-version: 16

          anykernel3: true
          ccache: true

          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
