name: CI

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kernel:
    name: Build Kernel (stone Android 16)
    runs-on: ubuntu-22.04

    steps:

      # Install dependencies
      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            curl \
            flex \
            git \
            kmod \
            libssl-dev \
            libelf-dev \
            libncurses5-dev \
            libncursesw5-dev \
            lzop \
            python3 \
            unzip \
            zip \
            wget \
            device-tree-compiler

      # 🔥 REAL FIX — build mkdtimg manually
      - name: Build mkdtimg Tool
        run: |
          git clone https://android.googlesource.com/platform/system/libufdt
          cd libufdt/utils
          gcc mkdtimg.c -o mkdtimg
          sudo mv mkdtimg /usr/local/bin/

      # Verify mkdtimg exists
      - name: Verify mkdtimg
        run: |
          mkdtimg --help || echo "mkdtimg installed"

      # Kernel Build
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/kamikaonashi/kernel_xiaomi_stone
          kernel-branch: 16
          config: stone_defconfig
          arch: arm64

          # Toolchains
          aosp-gcc: true
          aosp-clang: true
          aosp-clang-version: r383902

          # Android 16 (Correct for crDroid 12.7)
          android-version: 16

          # Packaging
          anykernel3: true

          # Performance
          ccache: true

          # Release
          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
