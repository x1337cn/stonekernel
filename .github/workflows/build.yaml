name: CI

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kernel:
    name: Build Kernel (stone Android 16)
    runs-on: ubuntu-22.04

    steps:

      # Step 1 — Install Dependencies
      - name: Install Dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            ccache \
            curl \
            flex \
            git \
            kmod \
            libssl-dev \
            libelf-dev \
            libncurses5-dev \
            libncursesw5-dev \
            lzop \
            python3 \
            unzip \
            zip \
            wget \
            device-tree-compiler

            # Step 2 — Install mkdtboimg safely
      - name: Install mkdtimg tools
        run: |
          echo "Cloning AOSP libufdt..."

          git clone https://android.googlesource.com/platform/system/libufdt

          sudo cp libufdt/utils/src/mkdtboimg.py /usr/local/bin/mkdtboimg.py

          sudo chmod +x /usr/local/bin/mkdtboimg.py

          echo "Creating mkdtimg wrapper..."

          echo '#!/usr/bin/env bash' | sudo tee /usr/local/bin/mkdtimg > /dev/null
          echo '' | sudo tee -a /usr/local/bin/mkdtimg > /dev/null
          echo 'if [[ "$1" == "create" ]]; then' | sudo tee -a /usr/local/bin/mkdtimg > /dev/null
          echo '    shift' | sudo tee -a /usr/local/bin/mkdtimg > /dev/null
          echo '    python3 /usr/local/bin/mkdtboimg.py create "$@"' | sudo tee -a /usr/local/bin/mkdtimg > /dev/null
          echo 'elif [[ "$1" == "cfg_create" ]]; then' | sudo tee -a /usr/local/bin/mkdtimg > /dev/null
          echo '    shift' | sudo tee -a /usr/local/bin/mkdtimg > /dev/null
          echo '    python3 /usr/local/bin/mkdtboimg.py cfg_create "$@"' | sudo tee -a /usr/local/bin/mkdtimg > /dev/null
          echo 'elif [[ "$1" == "dump" ]]; then' | sudo tee -a /usr/local/bin/mkdtimg > /dev/null
          echo '    shift' | sudo tee -a /usr/local/bin/mkdtimg > /dev/null
          echo '    python3 /usr/local/bin/mkdtboimg.py dump "$@"' | sudo tee -a /usr/local/bin/mkdtimg > /dev/null
          echo 'else' | sudo tee -a /usr/local/bin/mkdtimg > /dev/null
          echo '    python3 /usr/local/bin/mkdtboimg.py "$@"' | sudo tee -a /usr/local/bin/mkdtimg > /dev/null
          echo 'fi' | sudo tee -a /usr/local/bin/mkdtimg > /dev/null

          sudo chmod +x /usr/local/bin/mkdtimg

      # Step 3 — Verify mkdtimg
      - name: Verify mkdtimg
        run: |
          which mkdtimg
          which mkdtboimg.py
          mkdtimg help || true

      # Step 4 — Build Kernel
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/kamikaonashi/kernel_xiaomi_stone
          kernel-branch: 16

          config: stone_defconfig
          arch: arm64

          aosp-gcc: true
          aosp-clang: true

          # ✅ FIXED VERSION (WORKS)
          aosp-clang-version: r450784e

          android-version: 16

          anykernel3: true
          ccache: true

          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
