name: CI

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-kernel:
    name: Build Kernel (stone Android 16)
    runs-on: ubuntu-22.04

    steps:

      # Install Dependencies (FIXED)
      - name: Install Dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            ccache \
            curl \
            flex \
            git \
            kmod \
            libssl-dev \
            libelf-dev \
            libncurses5-dev \
            libncursesw5-dev \
            lzop \
            python3 \
            unzip \
            zip \
            wget \
            device-tree-compiler

      # Install mkdtboimg + mkdtimg wrapper
      - name: Install mkdtimg (Android 16 Fix)
        run: |

          curl -L \
          https://android.googlesource.com/platform/system/libufdt/+/refs/heads/main/utils/src/mkdtboimg.py?format=TEXT \
          | base64 -d > mkdtboimg.py

          chmod +x mkdtboimg.py

          sudo mv mkdtboimg.py /usr/local/bin/

          sudo tee /usr/local/bin/mkdtimg > /dev/null << 'EOF'
#!/usr/bin/env bash

if [[ "$1" == "create" ]]; then
    shift
    python3 /usr/local/bin/mkdtboimg.py create "$@"
elif [[ "$1" == "cfg_create" ]]; then
    shift
    python3 /usr/local/bin/mkdtboimg.py cfg_create "$@"
elif [[ "$1" == "dump" ]]; then
    shift
    python3 /usr/local/bin/mkdtboimg.py dump "$@"
else
    python3 /usr/local/bin/mkdtboimg.py "$@"
fi
EOF

          sudo chmod +x /usr/local/bin/mkdtimg

      # Build Kernel
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/kamikaonashi/kernel_xiaomi_stone
          kernel-branch: 16
          config: stone_defconfig
          arch: arm64

          aosp-gcc: true
          aosp-clang: true
          aosp-clang-version: r450784d   # FIXED

          android-version: 16

          anykernel3: true
          ccache: true

          release: true
          access-token: ${{ secrets.GITHUB_TOKEN }}
